<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - India Hackathon Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Centers the entire container smoothly in the middle of mobile screens */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }

    .main-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      width: 100%;
      box-sizing: border-box;
    }

    .auth-container {
      margin: 0 auto !important; /* Overrides static top margins to keep it completely centered */
      width: 100%;
      max-width: 450px;
    }

    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--border-color);
    }

    .auth-tabs button {
      flex: 1;
      padding: 15px;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      box-shadow: none;
    }

    .auth-tabs button.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .auth-tabs button:hover {
      color: var(--primary);
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .signup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 15px;
    }

    @media (max-width: 600px) {
      .signup-grid {
        grid-template-columns: 1fr;
      }
    }

    .checkbox-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      padding: 10px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 8px;
      cursor: pointer;
    }

    .checkbox-item input[type="checkbox"] {
      margin-right: 10px;
      cursor: pointer;
    }

    .checkbox-item label {
      cursor: pointer;
      flex: 1;
      margin: 0;
    }

    .form-section label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-section select,
    .form-section textarea {
      width: 100%;
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: inherit;
      backdrop-filter: blur(10px);
      margin-bottom: 15px;
    }

    .form-section select:focus,
    .form-section textarea:focus {
      outline: none;
      background: rgba(30, 41, 59, 0.8);
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
    }

    .section-title {
      color: var(--secondary);
      font-size: 14px;
      font-weight: 700;
      margin: 20px 0 15px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-box {
      background: rgba(99, 102, 241, 0.1);
      border-left: 4px solid var(--primary);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* FORGOT PASSWORD MODAL STYLING */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
      box-sizing: border-box;
    }
    .modal-card {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">🚀 HackHub</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
  </ul>
</nav>

<div class="main-wrapper">
  <div class="auth-container">
    <h2>Welcome! 👋</h2>
    
    <div class="auth-tabs">
      <button type="button" class="tab-btn active" id="tab-login" onclick="switchTab('login')">🔓 Login</button>
      <button type="button" class="tab-btn" id="tab-signup" onclick="switchTab('signup')">📝 Sign Up</button>
    </div>

    <div id="login" class="form-section active">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="your.email@example.com">
      </div>

      <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
          <label for="login-password" style="margin: 0;">Password</label>
          <span onclick="openForgotModal()" style="color: #6366f1; font-size: 12px; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Forgot Password?</span>
        </div>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>

      <button type="button" onclick="window.login()" style="width: 100%; margin-top: 20px;">🔓 Login</button>
