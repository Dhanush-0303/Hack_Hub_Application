<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HackHub - Sign In</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #5568d3;
      --primary-light: #8b9ff1;
      --secondary: #764ba2;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg-darker: #0f172a;
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border-color: #334155;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg-darker) 0%, #1a1f35 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      padding: 20px;
    }
    
    .auth-wrapper {
      width: 100%;
      max-width: 420px;
    }
    
    .logo-block {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .logo-icon {
      font-size: 50px;
      display: block;
      margin-bottom: 15px;
    }
    
    .logo-name {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    
    .card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .login-heading {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    
    .login-sub {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }
    
    .field {
      margin-bottom: 20px;
    }
    
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(51, 65, 85, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    
    .field input:focus {
      outline: none;
      background: rgba(51, 65, 85, 0.8);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .field input::placeholder {
      color: rgba(203, 213, 225, 0.5);
    }
    
    .forgot-link {
      text-align: right;
      margin-top: -12px;
      margin-bottom: 20px;
    }
    
    .forgot-link a {
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
      transition: color 0.3s ease;
      cursor: pointer;
    }
    
    .forgot-link a:hover {
      color: var(--primary-light);
    }
    
    .btn {
      width: 100%;
      padding: 13px 20px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    
    .btn-primary:active {
      transform: scale(0.98);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-google {
      background: rgba(51, 65, 85, 0.5);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }
    
    .btn-google:hover {
      background: rgba(51, 65, 85, 0.8);
      border-color: var(--primary);
    }
    
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 12px;
      margin: 24px 0;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }
    
    .signup-link {
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 20px;
    }
    
    .signup-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    
    .signup-link a:hover {
      text-decoration: underline;
    }
    
    .msg {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    
    .msg.show {
      display: flex;
    }
    
    .msg-error {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .msg-success {
      background: rgba(16, 185, 129, 0.1);
      color: #86efac;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="logo-block">
    <span class="logo-icon">🚀</span>
    <div class="logo-name">HackHub</div>
    <p style="color: var(--text-secondary); font-size: 13px;">India's Hackathon Platform</p>
  </div>
  
  <div class="card">
    <div id="login-form" style="display: block;">
      <h2 class="login-heading">Sign In</h2>
      <p class="login-sub">Enter your email and password</p>
      
      <div id="loginMsg" class="msg"></div>
      
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="your@email.com">
      </div>
      
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      
      <div class="forgot-link">
        <a onclick="showResetForm()">Forgot password?</a>
      </div>
      
      <button class="btn btn-primary" onclick="doLogin()">
        <span>Sign In</span>
        <span>→</span>
      </button>
      
      <div class="divider">or continue with</div>
      
      <button class="btn btn-google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      
      <div class="signup-link">
        Don't have an account? <a onclick="showSignupForm()">Create one</a>
      </div>
    </div>
    
    <div id="reset-form" style="display: none;">
      <h2 class="login-heading">Reset Password</h2>
      <p class="login-sub">Enter your email to reset password</p>
      
      <div id="resetMsg" class="msg"></div>
      
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="resetEmail" placeholder="your@email.com">
      </div>
      
      <div class="field">
        <label>New Password</label>
        <input type="password" id="resetPassword" placeholder="••••••••">
      </div>
      
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="resetConfirm" placeholder="••••••••">
      </div>
      
      <button class="btn btn-primary" onclick="doPasswordReset()">Reset Password</button>
      <button class="btn" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);" onclick="showLoginForm()">Back to Sign In</button>
    </div>
    
    <div id="signup-form" style="display: none;">
      <h2 class="login-heading">Create Account</h2>
      <p class="login-sub">Join India's hackathon community</p>
      
      <div id="signupMsg" class="msg"></div>
      
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="John Doe">
      </div>
      
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="signupEmail" placeholder="your@email.com">
      </div>
      
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="••••••••">
      </div>
      
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="signupConfirm" placeholder="••••••••">
      </div>
      
      <button class="btn btn-primary" onclick="doSignup()">Create Account</button>
      <button class="btn" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);" onclick="showLoginForm()">Back to Sign In</button>
    </div>
  </div>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/validation.js"></script>
</body>
</html>
