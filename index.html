<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>India Hackathon Hub - Splash Screen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .splash-container {
      text-align: center;
      animation: fadeIn 0.8s ease-in;
    }
    
    .logo {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }
    
    h1 {
      font-size: 42px;
      color: white;
      margin-bottom: 15px;
      font-weight: 700;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    
    p {
      font-size: 18px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 10px;
    }
    
    .loading {
      margin-top: 40px;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
    }
    
    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="splash-container">
  <div class="logo">🚀</div>
  <h1>India Hackathon Hub</h1>
  <p>Discover & Register for Hackathons</p>
  <p style="font-size: 14px; color: rgba(255,255,255,0.7);">Internships • Courses • Certifications</p>
  
  <div class="loading">
    <div class="spinner"></div>
    <span>Loading opportunities...</span>
  </div>
</div>

<script src="js/firebase-config.js"></script>
<script>
  // Service Worker Registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('✅ Service Worker registered'))
      .catch(err => console.error('❌ Service Worker error:', err));
  }
  
  // Check login status and redirect
  setTimeout(() => {
    const userId = localStorage.getItem('hackhub_user_id');
    if (userId) {
      window.location.href = 'home.html';
    } else {
      window.location.href = 'login.html';
    }
  }, 2000);
</script>

</body>
</html>
