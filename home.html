<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HackHub - Home</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #5568d3;
      --secondary: #764ba2;
      --bg-darker: #0f172a;
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border-color: #334155;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg-darker) 0%, #1a1f35 100%);
      color: var(--text-primary);
      padding-bottom: 80px;
    }
    
    /* Top App Bar */
    .top-app-bar {
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .app-logo {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .top-icons {
      display: flex;
      gap: 16px;
    }
    
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(51, 65, 85, 0.5);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .icon-btn:hover {
      background: rgba(51, 65, 85, 0.8);
      border-color: var(--primary);
    }
    
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      width: 20px;
      height: 20px;
      background: #ef4444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }
    
    /* Search Bar */
    .search-container {
      padding: 16px;
      background: rgba(30, 41, 59, 0.5);
    }
    
    .search-bar {
      width: 100%;
      padding: 12px 16px;
      background: rgba(51, 65, 85, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }
    
    .search-bar:focus {
      background: rgba(51, 65, 85, 0.8);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .search-bar::placeholder {
      color: rgba(203, 213, 225, 0.5);
    }
    
    /* Content Area */
    .content {
      padding: 20px 16px;
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      margin-top: 12px;
    }
    
    /* Featured Carousel */
    .carousel {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    
    .carousel::-webkit-scrollbar {
      height: 4px;
    }
    
    .carousel::-webkit-scrollbar-track {
      background: rgba(51, 65, 85, 0.3);
      border-radius: 10px;
    }
    
    .carousel::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }
    
    .carousel-item {
      flex-shrink: 0;
      width: 280px;
      height: 160px;
      background: rgba(51, 65, 85, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }
    
    .carousel-item:hover {
      background: rgba(51, 65, 85, 0.8);
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }
    
    .carousel-item-header {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    
    .carousel-item-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    
    .carousel-item-title {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.3;
    }
    
    .carousel-item-deadline {
      font-size: 11px;
      color: #fca5a5;
    }
    
    /* Grid Cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .card {
      background: rgba(51, 65, 85, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    
    .card:hover {
      background: rgba(51, 65, 85, 0.8);
      border-color: var(--primary);
      transform: translateY(-4px);
    }
    
    .card-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }
    
    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-around;
      height: 70px;
      z-index: 200;
    }
    
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
    }
    
    .nav-item.active {
      color: var(--primary);
    }
    
    .nav-icon {
      font-size: 24px;
    }
    
    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
      
      .carousel-item {
        width: 240px;
      }
    }
  </style>
</head>
<body>

<!-- Top App Bar -->
<div class="top-app-bar">
  <div class="app-logo">HackHub</div>
  <div class="top-icons">
    <button class="icon-btn" onclick="toggleDarkMode()" title="Dark Mode">
      🌙
    </button>
    <button class="icon-btn" onclick="showNotifications()" title="Notifications">
      🔔
      <div class="notification-badge" id="notificationBadge" style="display: none;">3</div>
    </button>
    <button class="icon-btn" onclick="showSubmissionForm()" title="Submit Opportunity">
      ➕
    </button>
  </div>
</div>

<!-- Search -->
<div class="search-container">
  <input type="text" class="search-bar" id="searchInput" placeholder="Search hackathons, internships, courses..." oninput="performSearch()">
</div>

<!-- Main Content -->
<div class="content">
  <!-- Featured Section -->
  <div class="section-title">✨ Featured Opportunities</div>
  <div class="carousel" id="featuredCarousel">
    <!-- Loaded from Firebase -->
  </div>
  
  <!-- Quick Categories -->
  <div class="section-title">🎯 Quick Access</div>
  <div class="grid">
    <div class="card" onclick="navigateTo('hackathons.html')">
      <div class="card-icon">🚀</div>
      <div class="card-title">Hackathons</div>
    </div>
    <div class="card" onclick="navigateTo('internships.html')">
      <div class="card-icon">💼</div>
      <div class="card-title">Internships</div>
    </div>
    <div class="card" onclick="navigateTo('courses.html')">
      <div class="card-icon">📚</div>
      <div class="card-title">Courses</div>
    </div>
    <div class="card" onclick="navigateTo('certifications.html')">
      <div class="card-icon">🏆</div>
      <div class="card-title">Certifications</div>
    </div>
  </div>
  
  <!-- Trending Section -->
  <div class="section-title">🔥 Trending This Week</div>
  <div class="carousel" id="trendingCarousel">
    <!-- Loaded from Firebase -->
  </div>
  
  <!-- Recently Added -->
  <div class="section-title">🆕 Recently Added</div>
  <div class="carousel" id="recentCarousel">
    <!-- Loaded from Firebase -->
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <a class="nav-item active" onclick="setActiveNav(0)" href="#">
    <div class="nav-icon">🏠</div>
    <div>Home</div>
  </a>
  <a class="nav-item" onclick="setActiveNav(1); navigateTo('hackathons.html')" href="#">
    <div class="nav-icon">🚀</div>
    <div>Hackathons</div>
  </a>
  <a class="nav-item" onclick="setActiveNav(2); navigateTo('internships.html')" href="#">
    <div class="nav-icon">💼</div>
    <div>Internships</div>
  </a>
  <a class="nav-item" onclick="setActiveNav(3); navigateTo('courses.html')" href="#">
    <div class="nav-icon">📚</div>
    <div>Courses</div>
  </a>
  <a class="nav-item" onclick="setActiveNav(4); navigateTo('certifications.html')" href="#">
    <div class="nav-icon">🏆</div>
    <div>Certifications</div>
  </a>
  <a class="nav-item" onclick="setActiveNav(5); navigateTo('profile.html')" href="#">
    <div class="nav-icon">👤</div>
    <div>Profile</div>
  </a>
</nav>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
